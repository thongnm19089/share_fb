{% extends 'automation/base.html' %}
{% block content %}
<!-- Header responsive: stack on mobile -->
<div class="mb-3">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
        <div class="d-flex align-items-center flex-wrap gap-2">
            <h5 class="mb-0 fw-bold d-flex align-items-center">🔥 <span class="d-none d-sm-inline me-1">Bài Viết</span>
                Nổi Bật <span class="badge bg-light text-dark ms-2 border fw-normal shadow-sm text-truncate"
                    style="font-size: 0.8rem; letter-spacing: -0.2px;"><i class="fas fa-clock text-muted"></i> <span
                        class="d-none d-sm-inline">Cập nhật: </span>
                    {% if latest_scraped_at %}
                    {{ latest_scraped_at|date:"d/m H:i" }}
                    {% else %}
                    ---
                    {% endif %}
                </span></h5>
            <select id="sort-select" class="form-select form-select-sm" style="width: auto; min-width: 130px;">
                <option value="engagement">Tương tác Cao nhất</option>
                <option value="time" selected>Bài mới nhất</option>
            </select>
            <div class="input-group input-group-sm" style="width: 200px;">
                <input type="text" id="search-input" class="form-control" placeholder="Tìm tên Stt...">
                <button class="btn btn-outline-secondary" type="button" id="btn-search"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button id="btn-scrape-all" class="btn btn-success btn-sm"><i class="fas fa-robot"></i> <span
                    class="d-none d-sm-inline">Quét Tất Cả Pages</span><span class="d-sm-none">Quét</span></button>
            <a href="{% url 'page_list' %}" class="btn btn-outline-primary btn-sm"><i class="fas fa-cog"></i> <span
                    class="d-none d-sm-inline">Quản lý Pages</span><span class="d-sm-none">Pages</span></a>
        </div>
    </div>
</div>

<div id="scrape-progress-wrapper" class="d-none mb-4">
    <div class="d-flex justify-content-between align-items-center mb-1">
        <h5 class="mb-0">Đang quét dữ liệu... <span id="scrape-percent">0</span>%</h5>
        <button id="btn-cancel-scrape" class="btn btn-sm btn-outline-danger">
            <i class="fas fa-times-circle"></i> Hủy
        </button>
    </div>
    <div class="progress" style="height: 25px;">
        <div id="scrape-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success"
            role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
</div>

<div id="posts-container" class="row">
</div>

<div class="col-12 text-center py-4" id="scroll-detector">
    <button id="btn-load-more" class="btn btn-outline-secondary d-none">Đang tải...</button>
</div>

<script>
    function copyToClipboard(text, btn) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).catch(err => {
                fallbackCopyTextToClipboard(text);
            });
        } else {
            fallbackCopyTextToClipboard(text);
        }

        function fallbackCopyTextToClipboard(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            document.body.removeChild(textArea);
        }

        const icon = btn.querySelector('i');
        const oldClass = icon.className;
        icon.className = 'fas fa-check text-success';
        setTimeout(() => { icon.className = 'far fa-copy'; }, 2000);
    }

    document.addEventListener("DOMContentLoaded", function () {
        const btnScrapeAll = document.getElementById('btn-scrape-all');
        const progressWrapper = document.getElementById('scrape-progress-wrapper');
        const progressBar = document.getElementById('scrape-progress-bar');
        const progressPercent = document.getElementById('scrape-percent');
        const postsContainer = document.getElementById('posts-container');
        const emptyState = document.getElementById('empty-state');
        const btnCancelScrape = document.getElementById('btn-cancel-scrape');

        let pollInterval;
        let isScrapingActive = {% if is_scraping_active %}true{% else %}false{% endif %};

    // Restore progress on page load if active
    if (isScrapingActive) {
        btnScrapeAll.disabled = true;
        progressWrapper.classList.remove('d-none');
        checkStatus('global'); // Fetch initial progress right away
        pollInterval = setInterval(() => checkStatus('global'), 2000);
    }

    btnScrapeAll.addEventListener('click', function () {
        if (!confirm('Bắt đầu quét TẤT CẢ các Pages? Dữ liệu sẽ lưu vào DB.')) return;

        btnScrapeAll.disabled = true;
        progressWrapper.classList.remove('d-none');
        updateProgress(0);

        fetch("{% url 'api_start_scrape' %}")
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    alert(data.message);
                    resetUI();
                    return;
                }
                // 'success' hoặc 'already_running' → đều bắt đầu poll
                pollInterval = setInterval(() => checkStatus('global'), 2000);
            })
            .catch(err => {
                alert("Lỗi khi gọi API: " + err);
                resetUI();
            });
    });

    if (btnCancelScrape) {
        btnCancelScrape.addEventListener('click', function () {
            if (!confirm('Bạn có chắc chắn muốn hủy quét? Các trang đang quét dở sẽ bị dừng ngay lập tức.')) return;

            // Vô hiệu hóa nút phòng click nhiều lần
            const originalHtml = this.innerHTML;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang hủy...';
            this.disabled = true;

            fetch('/api/scrape/cancel/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/json'
                }
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        clearInterval(pollInterval);
                        resetUI();
                        alert('Đã hủy tiến trình quét.');
                    } else {
                        alert('Lỗi khi hủy: ' + (data.error || data.message));
                        this.innerHTML = originalHtml;
                        this.disabled = false;
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Lỗi kết nối khi hủy.');
                    this.innerHTML = originalHtml;
                    this.disabled = false;
                });
        });
    }

    function checkStatus(jobId) {
        fetch(`/api/scrape/status/${jobId}/`)
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    alert("Lỗi trong quá trình quét: " + (data.error || data.message));
                    clearInterval(pollInterval);
                    resetUI();
                    return;
                }

                updateProgress(data.progress);

                if (data.status === 'completed') {
                    clearInterval(pollInterval);
                    setTimeout(() => {
                        progressWrapper.classList.add('d-none');
                        btnScrapeAll.disabled = false;
                        // Reset và tải lại danh sách từ DB (tự động hiển thị sau quét)
                        currentPage = 1;
                        hasMore = true;
                        lastRenderedDate = null;
                        postsContainer.innerHTML = '';
                        loadHistoryPosts();
                    }, 500);
                }
            })
            .catch(err => console.error(err));
    }

    function updateProgress(pct) {
        progressBar.style.width = pct + '%';
        progressBar.setAttribute('aria-valuenow', pct);
        progressPercent.textContent = pct;
    }

    function resetUI() {
        btnScrapeAll.disabled = false;
        progressWrapper.classList.add('d-none');
    }

    function formatRelativeTime(dateString) {
        if (!dateString) return 'N/A';
        const postDate = new Date(dateString);
        const now = new Date();

        const hours = postDate.getHours().toString().padStart(2, '0');
        const minutes = postDate.getMinutes().toString().padStart(2, '0');
        let timeStr = `${hours}:${minutes}`;

        const isToday = postDate.getDate() === now.getDate() &&
            postDate.getMonth() === now.getMonth() &&
            postDate.getFullYear() === now.getFullYear();

        if (isToday) {
            const diffMs = now - postDate;
            const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));

            if (diffHrs > 0) {
                timeStr += ` (${diffHrs} giờ trước)`;
            } else {
                const diffMins = Math.floor(diffMs / (1000 * 60));
                if (diffMins > 0) {
                    timeStr += ` (${diffMins} phút trước)`;
                } else {
                    timeStr += ` (Vừa xong)`;
                }
            }
        }
        return timeStr;
    }

    let lastRenderedDate = null; // Dùng để theo dõi dải phân cách ngày

    function appendPosts(results) {
        if (!results || results.length === 0) {
            if (postsContainer.innerHTML.trim() === '') {
                postsContainer.innerHTML = `
                    <div class="col-12 text-center py-5 text-muted w-100">
                        <h4>Không có bài viết nào trong Lịch sử</h4>
                    </div>`;
            }
            return;
        }

        let html = '';
        results.forEach(post => {
            const timeStr = formatRelativeTime(post.posted_at);

            // Grouping by Date logic
            const currentDateGroup = post.post_date || 'Unknown Date';
            if (currentDateGroup !== lastRenderedDate) {
                lastRenderedDate = currentDateGroup;
                let displayDate = currentDateGroup;
                if (currentDateGroup === new Date().toISOString().split('T')[0]) {
                    displayDate = "Ngày Hôm Nay";
                }
                html += `
                    <div class="col-12 mt-4 mb-3">
                        <div class="d-flex align-items-center">
                            <hr class="flex-grow-1 border-primary opacity-25">
                            <span class="badge bg-primary rounded-pill px-3 py-2 mx-3 fs-6"><i class="far fa-calendar-alt me-2"></i>${displayDate}</span>
                            <hr class="flex-grow-1 border-primary opacity-25">
                        </div>
                    </div>`;
            }

            const borderClass = post.total_engagement > 100 ? 'success' : 'secondary';
            const defaultSnippet = "[Không có nội dung text]";

            html += `
            <div class="col-6 col-md-4 col-xl-3 mb-2">
                <div class="card h-100 shadow-sm border-${borderClass}" style="background:#f8f9fa;">
                    <div class="card-header bg-white py-1 px-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold text-primary text-truncate small" style="font-size:0.82rem; max-width:55%;"><i class="fas fa-flag me-1"></i>${post.page_name || 'Page'}</span>
                            <a href="${post.post_url}" target="_blank" class="text-decoration-none text-secondary text-nowrap" style="font-size:0.75rem;" title="Xem Bài">
                                <i class="far fa-clock"></i> ${timeStr}
                            </a>
                        </div>
                    </div>
                    <div class="card-body py-1 px-2 d-flex flex-column" style="background:#f8f9fa; position:relative;">
                        <button class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0 border-0 p-1 mt-1 me-1 shadow-sm" 
                            onclick="copyToClipboard(this.dataset.snippet, this)" 
                            data-snippet="${(post.content_snippet || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')}"
                            title="Copy nội dung" style="background: rgba(255,255,255,0.9); z-index:2;">
                            <i class="far fa-copy"></i>
                        </button>
                        <p class="card-text mb-1 pe-4"
                            style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.88rem;">
                            ${post.content_snippet || defaultSnippet}
                        </p>
                        <div class="mt-auto" style="padding-bottom:2px;">
                        <hr class="my-1">
                        <div class="d-flex justify-content-between text-muted" style="font-size:0.8rem;">
                            <span title="Likes"><i class="fas fa-thumbs-up text-primary"></i> ${post.likes || 0}</span>
                            <span title="Comments"><i class="fas fa-comment text-warning"></i> ${post.comments || 0}</span>
                            <span title="Shares"><i class="fas fa-share text-success"></i> ${post.shares || 0}</span>
                            <strong title="Total Engagement" class="text-danger"><i class="fas fa-fire"></i> ${post.total_engagement || 0}</strong>
                        </div>
                        </div>
                    </div>
                </div>
            </div>`;
        });

        postsContainer.insertAdjacentHTML('beforeend', html);
    }

    // Logic for infinite scrolling / load more historic posts
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    const btnLoadMore = document.getElementById('btn-load-more');

    let currentSort = 'time';
    let currentSearch = '';
    const sortSelect = document.getElementById('sort-select');
    const searchInput = document.getElementById('search-input');
    const btnSearch = document.getElementById('btn-search');

    function triggerReload() {
        currentPage = 1;
        hasMore = true;
        lastRenderedDate = null;
        postsContainer.innerHTML = ''; // Reset ui
        loadHistoryPosts();
    }

    sortSelect.addEventListener('change', function () {
        currentSort = this.value;
        triggerReload();
    });

    btnSearch.addEventListener('click', function () {
        currentSearch = searchInput.value.trim();
        triggerReload();
    });

    searchInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            currentSearch = searchInput.value.trim();
            triggerReload();
        }
    });

    function loadHistoryPosts() {
        if (isLoading || !hasMore) return;
        isLoading = true;
        btnLoadMore.classList.remove('d-none');
        btnLoadMore.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Đang tải...';

        fetch(`/api/posts/?page=${currentPage}&sort=${currentSort}&q=${encodeURIComponent(currentSearch)}`)
            .then(res => res.json())
            .then(data => {
                isLoading = false;
                if (data.status === 'ok') {
                    appendPosts(data.results);
                    hasMore = data.has_next;
                    if (hasMore) {
                        currentPage++;
                        btnLoadMore.textContent = "Tải thêm bài viết ▼";
                        // Nếu màn hình lớn, scroll-detector đã trong viewport → auto load tiếp
                        setTimeout(() => {
                            const rect = document.getElementById('scroll-detector').getBoundingClientRect();
                            if (rect.top < window.innerHeight && hasMore && !isLoading) {
                                loadHistoryPosts();
                            }
                        }, 150);
                    } else {
                        btnLoadMore.classList.add('d-none');
                    }
                }
            })
            .catch(err => {
                isLoading = false;
                console.error("Lỗi tải lịch sử:", err);
            });
    }

    // Click button để load thêm (dành cho màn hình lớn)
    btnLoadMore.addEventListener('click', () => {
        if (!isLoading && hasMore) loadHistoryPosts();
    });

    // Set up IntersectionObserver for Infinite Scrolling
    const observerOptions = {
        root: null,          // viewport - body scroll tự nhiên
        rootMargin: '400px',
        threshold: 0
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && hasMore && !isLoading) {
                loadHistoryPosts();
            }
        });
    }, observerOptions);

    observer.observe(document.getElementById('scroll-detector'));

    // Fallback window scroll
    window.addEventListener('scroll', function () {
        if (!hasMore || isLoading) return;
        if (window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 300) {
            loadHistoryPosts();
        }
    });

    loadHistoryPosts();
</script>
{% endblock %}
