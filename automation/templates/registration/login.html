<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - FbTool Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .login-card {
            width: 100%;
            max-width: 400px;
            margin: 40px auto;
            padding: 16px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card p-4 shadow-sm">
            <h3 class="text-center mb-4 text-primary">FbTool Pro</h3>
            {% if form.errors %}
                <div class="alert alert-danger">Tên đăng nhập hoặc mật khẩu không chính xác!</div>
            {% endif %}
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Tên Đăng Nhập</label>
                    <input type="text" name="username" class="form-control form-control-lg" required autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" name="password" class="form-control form-control-lg" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Đăng Nhập</button>
                <input type="hidden" name="next" value="{{ next }}" />
            </form>
        </div>
    </div>
</body>
</html>
